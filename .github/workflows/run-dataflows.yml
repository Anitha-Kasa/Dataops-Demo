name: Run DataFlow

on:
  push:
    branches:
      - main
    paths:
      - 'Dataflow/**'

jobs:
  run-dataflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate OAuth Token
        run: |
          BASIC_AUTH=$(echo -n "${{ secrets.DATAOPS_CLIENT_ID }}:${{ secrets.DATAOPS_CLIENT_SECRET }}" | base64)

          TOKEN_RESPONSE=$(curl -s -X POST \
            "${{ secrets.DATAOPS_BASEURL }}/dataopssecurity/oauth2/token" \
            -H "Accept: application/json" \
            -H "Authorization: Basic $BASIC_AUTH" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&username=${{ secrets.DATAOPS_USERNAME }}&password=${{ secrets.DATAOPS_PASSWORD }}")

          echo "Token Response:"
          echo "$TOKEN_RESPONSE"

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to generate access token"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Trigger DataFlow
        run: |
          DATAFLOW_ID="58be363b-9450-4769-aabe-eff7cb13a991"

          echo "Triggering DataFlow: $DATAFLOW_ID"

          RESPONSE=$(curl -s -X POST \
            "${{ secrets.DATAOPS_BASEURL }}/DataFlowService/api/v2/dataflow/${DATAFLOW_ID}/run" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{
                  "parameters":"{\"limit_rows\":\"limit 1000\",\"userid\":\"user_id>100\"}"
                }')

          echo "API Response:"
          echo "$RESPONSE"
